<script type="text/javascript">
  RED.nodes.registerType('surepetcare-control', {
    category: 'SureFlap',
    color: '#667f91',
    defaults: {
      name: { value: '' },
      config: { value: '', type: 'surepetcare-config', required: true },
      deviceId: { value: '' },
      lockState: { value: 0 },
    },
    inputs: 1,
    outputs: 1,
    icon: 'paw.svg',
    label: function () {
      return this.name || 'surepetcare control';
    },
    paletteLabel: 'surepetcare control',
    oneditprepare: function () {
      const node = this;

      // Pre-populate select with the stored device ID so it isn't lost before discovery
      if (node.deviceId) {
        $('#node-input-deviceId')
          .empty()
          .append($('<option>', { value: node.deviceId, text: 'Device ' + node.deviceId }))
          .val(node.deviceId);
      }

      $('#node-btn-discover').on('click', function () {
        const configId = $('#node-input-config').val();
        if (!configId) {
          RED.notify('Select and deploy a config node first.', { type: 'warning' });
          return;
        }
        const btn = $(this).prop('disabled', true);
        btn.find('i').attr('class', 'fa fa-spinner fa-spin');

        const productNames = {
          1: 'Hub', 3: 'Pet Door Connect', 6: 'Cat Flap Connect',
          8: 'Feeder Connect', 13: 'Felaqua', 58: 'Dual Scan Cat Flap'
        };

        $.getJSON('/surepetcare/devices?id=' + configId)
          .done(function (devices) {
            const select = $('#node-input-deviceId');
            const current = select.val() || node.deviceId;
            select.empty();
            if (!devices.length) {
              select.append($('<option>', { value: '', text: '— no devices found —' }));
            }
            devices.forEach(function (d) {
              const product = productNames[d.product_id] || 'Device';
              select.append($('<option>', {
                value: String(d.id),
                text: d.name + ' (' + product + ', ' + d.serial_number + ')'
              }));
            });
            select.val(current);
            if (!select.val() && devices.length) {
              select.val(String(devices[0].id));
            }
          })
          .fail(function (xhr) {
            const msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Request failed';
            RED.notify('Discover failed: ' + msg, { type: 'error' });
          })
          .always(function () {
            btn.prop('disabled', false).find('i').attr('class', 'fa fa-search');
          });
      });
    },
  });
</script>

<script type="text/html" data-template-name="surepetcare-control">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-config"><i class="fa fa-cog"></i> Config</label>
    <input type="text" id="node-input-config" />
  </div>
  <div class="form-row">
    <label for="node-input-deviceId"><i class="fa fa-microchip"></i> Device</label>
    <select id="node-input-deviceId" style="width:45%">
      <option value="">— click Discover —</option>
    </select>
    <button type="button" id="node-btn-discover" class="red-ui-button" style="margin-left:6px">
      <i class="fa fa-search"></i> Discover
    </button>
  </div>
  <div class="form-row">
    <label for="node-input-lockState"><i class="fa fa-lock"></i> Lock state</label>
    <select id="node-input-lockState">
      <option value="0">0 - Unlocked (both ways)</option>
      <option value="1">1 - Locked in (entry only)</option>
      <option value="2">2 - Locked out (exit only)</option>
      <option value="3">3 - Locked (both ways)</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="surepetcare-control">
  <p>Controls a SureFlap cat flap: sets the lock state or renames the device.</p>
  <p>If <code>msg.payload.name</code> is set the device is renamed. Otherwise the lock state is applied.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt class="optional">payload.name <span class="property-type">string</span></dt>
    <dd>New display name for the device. When present, triggers a rename instead of a lock-state change.</dd>
    <dt class="optional">payload.lockState <span class="property-type">number</span></dt>
    <dd>Override the configured lock state: 0 unlocked, 1 locked-in, 2 locked-out, 3 locked</dd>
    <dt class="optional">payload.deviceId <span class="property-type">string</span></dt>
    <dd>Override the configured device ID</dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload.deviceId <span class="property-type">string</span></dt>
    <dd>Device ID that was targeted</dd>
    <dt class="optional">payload.name <span class="property-type">string</span></dt>
    <dd>New name that was applied (rename operations only)</dd>
    <dt class="optional">payload.lockState <span class="property-type">number</span></dt>
    <dd>Lock state that was applied (lock operations only)</dd>
  </dl>
</script>
