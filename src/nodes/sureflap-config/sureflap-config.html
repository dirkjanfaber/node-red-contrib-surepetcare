<script type="text/javascript">
  RED.nodes.registerType('surepetcare-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
    },
    credentials: {
      email: { type: 'text' },
      password: { type: 'password' },
      deviceId: { type: 'text' },
    },
    label: function () {
      return this.name || 'SureFlap';
    },
  });
</script>

<script type="text/html" data-template-name="surepetcare-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="SureFlap" />
  </div>
  <div class="form-row">
    <label for="node-config-input-email"><i class="fa fa-envelope"></i> Email</label>
    <input type="text" id="node-config-input-email" placeholder="your@email.com" />
  </div>
  <div class="form-row">
    <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
    <input type="password" id="node-config-input-password" />
  </div>
</script>

<script type="text/html" data-help-name="surepetcare-config">
  <p>Configuration node for the SurePetcare/SureFlap Connect API.</p>
  <p>Enter your SurePetcare account credentials. A stable device ID is generated
  automatically on first save and stored securely in credentials.</p>
</script>
